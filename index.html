<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>PAW Door Selection Tool</title>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="input-group-lang">
          <label for="language-selection">Language: </label>
          <select id="language-selection">
            <option value=""></option>
            <option value="tr">Türkçe</option>
            <option value="en">English</option>
          </select>
        </div>
        <h1 data-key="title">
          PAW Industrial High-Speed PVC Door Selection Tool
        </h1>
        <p data-key="subtitle">
          Enter your specifications to filter compatible PAW Door models.
        </p>
      </header>

      <div class="filter-section" id="filter-inputs">
        <div class="input-group">
          <label data-key="width" for="width-input">Width (mm)</label>
          <input type="number" id="width-input" placeholder="e.g. 5000" />
        </div>
        <div class="input-group">
          <label data-key="height" for="height-input">Height (mm)</label>
          <input type="number" id="height-input" placeholder="e.g. 3000" />
        </div>
        <div class="input-group">
          <label data-key="windLoad" for="windLoad">Wind Load Class</label>
          <select id="windLoad">
            <option value=""></option>
            <option value="0">Class 0</option>
            <option value="1">Class 1</option>
            <option value="2">Class 2</option>
            <option value="3">Class 3</option>
          </select>
        </div>
        <div class="input-group">
          <label data-key="indoorTemp" for="indoorTemp"
            >Min Indoor Temp (°C)</label
          >
          <input type="number" id="indoorTemp" value="0" />
        </div>
        <div class="input-group">
          <label data-key="outdoorTemp" for="outdoorTemp"
            >Min Outdoor Temp (°C)</label
          >
          <input type="number" id="outdoorTemp" value="0" />
        </div>
        <div class="input-group">
          <label data-key="safety" for="safety">Safety Required</label>
          <select id="safety">
            <option value=""></option>
            <option data-key="no" value="false">No</option>
            <option data-key="yes" value="true">Yes</option>
          </select>
        </div>
        <div class="input-group">
          <label data-key="speedControl" for="speedControl"
            >Speed Control</label
          >
          <select id="speedControl">
            <option value=""></option>
            <option data-key="no" value="false">No</option>
            <option data-key="yes" value="true">Yes</option>
          </select>
        </div>
        <div class="input-group">
          <label data-key="doorLocation" for="doorLocation"
            >Door Location</label
          >
          <select id="doorLocation">
            <option data-key="doorLocationBoth" value="both">Both</option>
            <option data-key="doorLocationIn" value="indoor">Indoor</option>
            <option data-key="doorLocationOut" value="outdoor">Outdoor</option>
          </select>
        </div>
        <div class="input-group">
          <label data-key="frequencyUsage" for="frequencyUsage"
            >Usage Frequency</label
          >
          <select id="frequencyUsage">
            <option data-key="frequencyUsage" value="">Usage Frequency</option>
            <option data-key="frequencyUsageLow" value="low">Low (0-40 Vehicles)</option>
            <option data-key="frequencyUsageMid" value="mid">Mid (40-80 Vehicles)</option>
            <option data-key="frequencyUsageHigh" value="high">High (80+ Vehicles)</option>
          </select>
        </div>
        <div class="input-group">
          <label data-key="specialUsage" for="specialUsage"
            >Special Application</label
          >
          <select id="specialUsage">
            <option value="none">None</option>
            <option value="robot">Robot Front</option>
            <option value="conveyor">Conveyor</option>
            <option value="pharma_food">Pharma or Food</option>
          </select>
        </div>
      </div>

      <div class="door-grid" id="door-container">
        <p
          style="
            grid-column: 1/-1;
            text-align: center;
            color: var(--text-muted);
          "
        >
          Please Choose Options
        </p>
      </div>
    </div>

    <script src="translation.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
